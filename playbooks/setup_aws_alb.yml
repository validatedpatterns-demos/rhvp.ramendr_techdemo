---
- name: Discover managed clusters
  import_playbook: rhvp.cluster_utils.download_managed_kubeconfigs

- name: Process kubeconfigs
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_dir: /tmp/kubeconfigs
  tasks:
    - name: Discover local kubeconfigs
      ansible.builtin.set_fact:
        kubeconfig_files: "{{ lookup('ansible.builtin.fileglob', kubeconfig_dir + '/*.yaml', wantlist=True) | list }}"

    - name: Show local kubeconfigs
      ansible.builtin.debug:
        msg: "{{ kubeconfig_files }}"

- name: Discover details about clusters
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_dir: /tmp/kubeconfigs
    primary_cluster_name: mjrtd-1
    secondary_cluster_name: mjrtd-2
  tasks:
    - name: Verify cluster connectivity and authentication
      kubernetes.core.k8s_info:
        kind: Ingress
        api_version: config.openshift.io/v1
        name: cluster
      register: cluster_info

    - name: Set Hub cluster domain and base domain
      ansible.builtin.set_fact:
        hub_cluster_domain: "{{ cluster_info.resources[0].spec.domain | regex_replace('^apps.', '') }}"
        base_domain: "{{ (cluster_info.resources[0].spec.domain | split('.'))[2:] | join('.') ~ '.' }}"

    - name: Set primary cluster domain
      kubernetes.core.k8s_info:
        kind: Ingress
        api_version: config.openshift.io/v1
        name: cluster
      register: cluster_info
      environment:
        KUBECONFIG: "{{ kubeconfig_dir  + '/' + primary_cluster_name + '.yaml' }}"

    - name: Set primary cluster domain
      ansible.builtin.set_fact:
        primary_cluster_domain: "{{ cluster_info.resources[0].spec.domain | regex_replace('^apps.', '') }}"

    - name: Set secondary cluster domain
      kubernetes.core.k8s_info:
        kind: Ingress
        api_version: config.openshift.io/v1
        name: cluster
      register: cluster_info
      environment:
        KUBECONFIG: "{{ kubeconfig_dir  + '/' + secondary_cluster_name + '.yaml' }}"

    - name: Set secondary cluster domain
      ansible.builtin.set_fact:
        secondary_cluster_domain: "{{ cluster_info.resources[0].spec.domain | regex_replace('^apps.', '') }}"

- name: Route53 failover — TCP health check (e.g. SSH)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    lb_hostname: rhel9-redis-001
    zone: aws.validatedpatterns.io
  tasks:
    - name: Derive failover FQDNs
      ansible.builtin.set_fact:
        alb_record: "{{ lb_hostname + '.' + hub_cluster_domain }}"
        primary_record: "{{ lb_hostname + '.' + primary_cluster_domain }}"
        secondary_record: "{{ lb_hostname + '.' + secondary_cluster_domain }}"

    - name: Create or remove TCP-based failover records
      ansible.builtin.include_role:
        name: aws_route53_failover
      vars:
        route53_zone: "{{ zone }}"
        route53_alb_record: "{{ alb_record }}"
        route53_primary_record: "{{ primary_record }}"
        route53_secondary_record: "{{ secondary_record }}"
        route53_health_check_type: TCP
        route53_health_check_port: 22
        route53_health_check_request_interval: "{{ health_check_request_interval | default(10) }}"
        aws_desired_state: "{{ aws_desired_state | default('present') }}"

- name: Route53 failover — HTTP health check (optional second record set)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    http_lb_hostname: frontend-boutique.apps
    zone: aws.validatedpatterns.io
    route53_create_http_failover: true
    route53_http_health_path: /
    route53_http_health_check_port: 80
    # HTTP or HTTPS (Route 53 health check type)
    route53_http_health_check_type: HTTP
  tasks:
    - name: Derive HTTP failover FQDNs (separate names from TCP set)
      ansible.builtin.set_fact:
        alb_record_http: "{{ http_lb_hostname + '.' + hub_cluster_domain }}"
        primary_record_http: "{{ http_lb_hostname + '.' + primary_cluster_domain }}"
        secondary_record_http: "{{ http_lb_hostname + '.' + secondary_cluster_domain }}"
      when: route53_create_http_failover | default(true) | bool

    - name: Create or remove HTTP-based failover records
      ansible.builtin.include_role:
        name: aws_route53_failover
      vars:
        route53_zone: "{{ zone }}"
        route53_alb_record: "{{ alb_record_http }}"
        route53_primary_record: "{{ primary_record_http }}"
        route53_secondary_record: "{{ secondary_record_http }}"
        route53_health_check_type: "{{ route53_http_health_check_type }}"
        route53_health_check_port: "{{ route53_http_health_check_port }}"
        route53_health_check_resource_path: "{{ route53_http_health_path }}"
        route53_health_check_request_interval: "{{ health_check_request_interval | default(10) }}"
        aws_desired_state: "{{ aws_desired_state | default('present') }}"
      when: route53_create_http_failover | default(false) | bool
